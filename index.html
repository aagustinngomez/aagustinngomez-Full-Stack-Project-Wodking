<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wodking</title>
    <link rel="stylesheet" href="/public/css/home.css">
</head>

<body>

    <nav class="navbar"></nav>

    <!-- hero section -->
    <header class="hero-section">
        <div class="content">
            <img src="public/img/wodking1.png" class="logo" alt="Logo">
            <p class="sub-heading">Elevate Your Performance with Elite CrossFit Gear</p>
        </div>
    </header>

    <section id="men-tshirt-products"></section>

    <!-- collections -->
    <section class="collection-container">
        <a href="#" class="collection">
            <img src="public/img/Toomey_win.jpg" alt="Women Apparels">
            <p class="collection-title">women <br> apparels</p>
        </a>
        <a href="#" class="collection">
            <img src="public/img/agustin.jpg" alt="Men Apparels">
            <p class="collection-title">Best <br> seller </p>
        </a>
    </section>

    <section id="shoes-products"></section>

    <section class="features-wrapper">
        <div class="feature">
            <img src="public/img/rain.png" alt="Free Shipping">
            <h3>Free Shipping</h3>
            <p>Enjoy free shipping on all orders.</p>
        </div>
        <div class="feature">
            <img src="public/img/rain.png" alt="24/7 Support">
            <h3>24/7 Support</h3>
            <p>We're here to help you anytime, day or night.</p>
        </div>
        <div class="feature">
            <img src="public/img/rain.png" alt="Special Offers">
            <h3>Special Offers</h3>
            <p>Check out our latest deals and discounts.</p>
        </div>
    </section>

    <footer></footer>

    <script>
        // Detect if the site is hosted on GitHub Pages
        const isGitHubPages = window.location.href.includes('github.io');
        
        // Set the base path accordingly
        const basePath = isGitHubPages ? '/aagustinngomez-Full-Stack-Project-Wodking' : '';
    
        // Update the link to the CSS file with the basePath
        document.querySelector('link[rel="stylesheet"]').href = `${basePath}/public/css/home.css`;
    
        // Update image paths
        document.querySelector('img.logo').src = `${basePath}/public/img/wodking1.png`;
        document.querySelectorAll('.collection img').forEach((img, index) => {
            const imgSrc = index === 0 ? 'Toomey_win.jpg' : 'agustin.jpg'; 
            img.src = `${basePath}/public/img/${imgSrc}`;
        });
    
        // Update JS script paths
        document.querySelectorAll('script[src]').forEach(script => {
            const src = script.getAttribute('src');
            script.src = `${basePath}/${src}`;
        });
    </script>

    <script src="public/js/nav.js"></script>
    <script src="public/js/footer.js"></script>
    <script src="public/js/home.js"></script>
    <script src="public/js/cart.js"></script>   

</body>

</html>
